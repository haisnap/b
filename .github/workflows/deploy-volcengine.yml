name: Deploy to Volcengine TOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-volcengine
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VOLCENGINE_CDN_REFRESH_WEBHOOK: ${{ secrets.VOLCENGINE_CDN_REFRESH_WEBHOOK }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Ensure AWS CLI
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user awscli
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Sync static files to Volcengine TOS
        env:
          VOLCENGINE_TOS_ACCESS_KEY_ID: ${{ secrets.VOLCENGINE_TOS_ACCESS_KEY_ID }}
          VOLCENGINE_ACCESS_KEY_ID: ${{ secrets.VOLCENGINE_ACCESS_KEY_ID }}
          TOS_ACCESS_KEY_ID: ${{ secrets.TOS_ACCESS_KEY_ID }}
          AWS_ACCESS_KEY_ID_SECRET: ${{ secrets.AWS_ACCESS_KEY_ID }}
          VOLCENGINE_TOS_SECRET_ACCESS_KEY: ${{ secrets.VOLCENGINE_TOS_SECRET_ACCESS_KEY }}
          VOLCENGINE_SECRET_ACCESS_KEY: ${{ secrets.VOLCENGINE_SECRET_ACCESS_KEY }}
          TOS_SECRET_ACCESS_KEY: ${{ secrets.TOS_SECRET_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          VOLCENGINE_TOS_REGION: ${{ secrets.VOLCENGINE_TOS_REGION }}
          VOLCENGINE_REGION: ${{ secrets.VOLCENGINE_REGION }}
          TOS_REGION: ${{ secrets.TOS_REGION }}
          AWS_DEFAULT_REGION_SECRET: ${{ secrets.AWS_DEFAULT_REGION }}
          VOLCENGINE_TOS_BUCKET_SECRET: ${{ secrets.VOLCENGINE_TOS_BUCKET }}
          VOLCENGINE_BUCKET: ${{ secrets.VOLCENGINE_BUCKET }}
          TOS_BUCKET: ${{ secrets.TOS_BUCKET }}
          VOLCENGINE_TOS_ENDPOINT_SECRET: ${{ secrets.VOLCENGINE_TOS_ENDPOINT }}
          TOS_ENDPOINT: ${{ secrets.TOS_ENDPOINT }}
          VOLCENGINE_TOS_PREFIX: ${{ secrets.VOLCENGINE_TOS_PREFIX }}
          VOLCENGINE_TOS_ACL: ${{ secrets.VOLCENGINE_TOS_ACL }}
        run: |
          set -euo pipefail

          export AWS_ACCESS_KEY_ID="${VOLCENGINE_TOS_ACCESS_KEY_ID:-${VOLCENGINE_ACCESS_KEY_ID:-${TOS_ACCESS_KEY_ID:-${AWS_ACCESS_KEY_ID_SECRET:-}}}}"
          export AWS_SECRET_ACCESS_KEY="${VOLCENGINE_TOS_SECRET_ACCESS_KEY:-${VOLCENGINE_SECRET_ACCESS_KEY:-${TOS_SECRET_ACCESS_KEY:-${AWS_SECRET_ACCESS_KEY_SECRET:-}}}}"
          export AWS_DEFAULT_REGION="${VOLCENGINE_TOS_REGION:-${VOLCENGINE_REGION:-${TOS_REGION:-${AWS_DEFAULT_REGION_SECRET:-}}}}"
          VOLCENGINE_TOS_BUCKET="${VOLCENGINE_TOS_BUCKET_SECRET:-${VOLCENGINE_BUCKET:-${TOS_BUCKET:-}}}"
          VOLCENGINE_TOS_ENDPOINT="${VOLCENGINE_TOS_ENDPOINT_SECRET:-${TOS_ENDPOINT:-}}"

          : "${AWS_ACCESS_KEY_ID:?Missing VOLCENGINE_TOS_ACCESS_KEY_ID secret}"
          : "${AWS_SECRET_ACCESS_KEY:?Missing VOLCENGINE_TOS_SECRET_ACCESS_KEY secret}"
          : "${AWS_DEFAULT_REGION:?Missing VOLCENGINE_TOS_REGION secret}"
          : "${VOLCENGINE_TOS_BUCKET:?Missing VOLCENGINE_TOS_BUCKET secret}"
          : "${VOLCENGINE_TOS_ENDPOINT:?Missing VOLCENGINE_TOS_ENDPOINT secret}"

          destination="s3://${VOLCENGINE_TOS_BUCKET}"
          if [ -n "${VOLCENGINE_TOS_PREFIX:-}" ]; then
            destination="${destination%/}/${VOLCENGINE_TOS_PREFIX#/}"
          fi

          acl_args=()
          if [ -n "${VOLCENGINE_TOS_ACL:-}" ]; then
            acl_args=(--acl "${VOLCENGINE_TOS_ACL}")
          fi

          aws s3 sync out/ "$destination" \
            --endpoint-url "$VOLCENGINE_TOS_ENDPOINT" \
            --delete \
            --cache-control "public,max-age=300" \
            "${acl_args[@]}"

      - name: Optional CDN refresh hook
        if: ${{ env.VOLCENGINE_CDN_REFRESH_WEBHOOK != '' }}
        env:
          VOLCENGINE_CDN_REFRESH_TOKEN: ${{ secrets.VOLCENGINE_CDN_REFRESH_TOKEN }}
        run: |
          set -euo pipefail

          auth_args=()
          if [ -n "${VOLCENGINE_CDN_REFRESH_TOKEN:-}" ]; then
            auth_args=(-H "Authorization: Bearer ${VOLCENGINE_CDN_REFRESH_TOKEN}")
          fi

          curl -fsS -X POST "${VOLCENGINE_CDN_REFRESH_WEBHOOK}" \
            "${auth_args[@]}" \
            -H "Content-Type: application/json" \
            --data '{"site":"https://b.haisnap.com/","paths":["https://b.haisnap.com/","https://b.haisnap.com/bank/","https://b.haisnap.com/robots.txt","https://b.haisnap.com/sitemap.xml"]}'
