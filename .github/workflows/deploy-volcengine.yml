name: Deploy SSR to Volcengine ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-volcengine-ecs
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      APP_NAME: haisnap-b
      NODE_VERSION: "20"
      DEFAULT_ECS_HOST: "124.174.70.119"
      DEFAULT_ECS_USER: root
      DEFAULT_ECS_PORT: "22"
      DEFAULT_DEPLOY_PATH: /www/wwwroot/b-haisnap
      DEFAULT_APP_PORT: "3000"
      VOLCENGINE_ECS_HOST: ${{ secrets.VOLCENGINE_ECS_HOST }}
      VOLCENGINE_ECS_USER: ${{ secrets.VOLCENGINE_ECS_USER }}
      VOLCENGINE_ECS_PORT: ${{ secrets.VOLCENGINE_ECS_PORT }}
      VOLCENGINE_ECS_DEPLOY_PATH: ${{ secrets.VOLCENGINE_ECS_DEPLOY_PATH }}
      VOLCENGINE_ECS_APP_PORT: ${{ secrets.VOLCENGINE_ECS_APP_PORT }}
      VOLCENGINE_ECS_SSH_KEY: ${{ secrets.VOLCENGINE_ECS_SSH_KEY }}
      VOLCENGINE_ECS_SSH_KEY_B64: ${{ secrets.VOLCENGINE_ECS_SSH_KEY_B64 }}
      ECS_HOST: ${{ secrets.ECS_HOST }}
      ECS_USER: ${{ secrets.ECS_USER }}
      ECS_PORT: ${{ secrets.ECS_PORT }}
      ECS_DEPLOY_PATH: ${{ secrets.ECS_DEPLOY_PATH }}
      ECS_APP_PORT: ${{ secrets.ECS_APP_PORT }}
      ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
      ECS_SSH_KEY_B64: ${{ secrets.ECS_SSH_KEY_B64 }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SSR app
        run: npm run build

      - name: Pack source archive
        run: |
          set -euo pipefail

          git archive --format=tar.gz --output=haisnap-b-source.tar.gz "$GITHUB_SHA"

      - name: Resolve ECS deploy settings
        run: |
          set -euo pipefail

          first_non_empty() {
            for value in "$@"; do
              if [ -n "${value:-}" ]; then
                printf '%s' "$value"
                return 0
              fi
            done
            return 1
          }

          ECS_HOST_RESOLVED="$(first_non_empty "${VOLCENGINE_ECS_HOST:-}" "${ECS_HOST:-}" "${SSH_HOST:-}" "${DEFAULT_ECS_HOST:-}")"
          ECS_USER_RESOLVED="$(first_non_empty "${VOLCENGINE_ECS_USER:-}" "${ECS_USER:-}" "${SSH_USER:-}" "${DEFAULT_ECS_USER:-}")"
          ECS_PORT_RESOLVED="$(first_non_empty "${VOLCENGINE_ECS_PORT:-}" "${ECS_PORT:-}" "${SSH_PORT:-}" "${DEFAULT_ECS_PORT:-}")"
          ECS_DEPLOY_PATH_RESOLVED="$(first_non_empty "${VOLCENGINE_ECS_DEPLOY_PATH:-}" "${ECS_DEPLOY_PATH:-}" "${DEFAULT_DEPLOY_PATH:-}")"
          ECS_APP_PORT_RESOLVED="$(first_non_empty "${VOLCENGINE_ECS_APP_PORT:-}" "${ECS_APP_PORT:-}" "${DEFAULT_APP_PORT:-}")"
          ECS_SSH_KEY_RESOLVED="$(first_non_empty "${VOLCENGINE_ECS_SSH_KEY:-}" "${ECS_SSH_KEY:-}" "${SSH_PRIVATE_KEY:-}")" || ECS_SSH_KEY_RESOLVED=""
          ECS_SSH_KEY_B64_RESOLVED="$(first_non_empty "${VOLCENGINE_ECS_SSH_KEY_B64:-}" "${ECS_SSH_KEY_B64:-}" "${SSH_PRIVATE_KEY_B64:-}")" || ECS_SSH_KEY_B64_RESOLVED=""

          if [ -z "$ECS_SSH_KEY_RESOLVED" ] && [ -z "$ECS_SSH_KEY_B64_RESOLVED" ]; then
            echo "::error title=Missing ECS SSH key::Add VOLCENGINE_ECS_SSH_KEY_B64, VOLCENGINE_ECS_SSH_KEY, ECS_SSH_KEY, or SSH_PRIVATE_KEY in GitHub repository secrets."
            exit 1
          fi

          {
            echo "ECS_HOST_RESOLVED=$ECS_HOST_RESOLVED"
            echo "ECS_USER_RESOLVED=$ECS_USER_RESOLVED"
            echo "ECS_PORT_RESOLVED=$ECS_PORT_RESOLVED"
            echo "ECS_DEPLOY_PATH_RESOLVED=$ECS_DEPLOY_PATH_RESOLVED"
            echo "ECS_APP_PORT_RESOLVED=$ECS_APP_PORT_RESOLVED"
          } >> "$GITHUB_ENV"

          install -m 700 -d ~/.ssh

          write_raw_key() {
            printf '%b\n' "$1" | tr -d '\r' > ~/.ssh/volcengine_ecs_key
          }

          write_base64_key() {
            printf '%s' "$1" | tr -d '\r\n ' | base64 -d > ~/.ssh/volcengine_ecs_key 2>/dev/null
          }

          key_is_valid() {
            chmod 600 ~/.ssh/volcengine_ecs_key
            ssh-keygen -y -f ~/.ssh/volcengine_ecs_key >/dev/null 2>&1
          }

          key_ok=0
          if [ -n "$ECS_SSH_KEY_B64_RESOLVED" ]; then
            if write_base64_key "$ECS_SSH_KEY_B64_RESOLVED" && key_is_valid; then
              key_ok=1
            fi
          fi

          if [ "$key_ok" -ne 1 ] && [ -n "$ECS_SSH_KEY_RESOLVED" ]; then
            if write_raw_key "$ECS_SSH_KEY_RESOLVED" && key_is_valid; then
              key_ok=1
            elif write_base64_key "$ECS_SSH_KEY_RESOLVED" && key_is_valid; then
              key_ok=1
            fi
          fi

          if [ "$key_ok" -ne 1 ]; then
            echo "::error title=Invalid ECS SSH key::The ECS SSH key secret could not be parsed. Prefer VOLCENGINE_ECS_SSH_KEY_B64 with base64 content, or re-copy the full private key including BEGIN and END lines."
            exit 1
          fi
          ssh-keyscan -p "$ECS_PORT_RESOLVED" -H "$ECS_HOST_RESOLVED" >> ~/.ssh/known_hosts

      - name: Upload source archive
        run: |
          set -euo pipefail

          timeout 300s scp -O \
            -i ~/.ssh/volcengine_ecs_key \
            -P "$ECS_PORT_RESOLVED" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            haisnap-b-source.tar.gz \
            "$ECS_USER_RESOLVED@$ECS_HOST_RESOLVED:/tmp/haisnap-b-$GITHUB_SHA.tar.gz"

      - name: Deploy SSR service on ECS
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/volcengine_ecs_key \
            -p "$ECS_PORT_RESOLVED" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "$ECS_USER_RESOLVED@$ECS_HOST_RESOLVED" \
            "APP_NAME='$APP_NAME' DEPLOY_PATH='$ECS_DEPLOY_PATH_RESOLVED' APP_PORT='$ECS_APP_PORT_RESOLVED' GITHUB_SHA='$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail

          for required_cmd in node npm tar; do
            if ! command -v "$required_cmd" >/dev/null 2>&1; then
              echo "$required_cmd is required on the ECS server."
              exit 1
            fi
          done

          if ! command -v node >/dev/null 2>&1; then
            echo "Node.js is required on the ECS server."
            exit 1
          fi

          if ! command -v pm2 >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then
              sudo npm install -g pm2
            else
              npm install -g pm2
            fi
          fi

          short_sha="${GITHUB_SHA:0:12}"
          archive="/tmp/haisnap-b-${GITHUB_SHA}.tar.gz"
          mkdir -p "$DEPLOY_PATH/releases"
          release="$DEPLOY_PATH/releases/$(date +%Y%m%d%H%M%S)-$short_sha"
          mkdir -p "$release"

          tar -xzf "$archive" -C "$release"
          rm -f "$archive"

          cd "$release"
          npm ci
          npm run build

          mkdir -p .next/standalone/.next
          rm -rf .next/standalone/.next/static .next/standalone/public
          cp -R .next/static .next/standalone/.next/static
          cp -R public .next/standalone/public

          ln -sfn "$release" "$DEPLOY_PATH/current"

          cd "$DEPLOY_PATH/current/.next/standalone"
          export NODE_ENV=production
          export PORT="$APP_PORT"
          export HOSTNAME=0.0.0.0

          # pm2 reload keeps the original server.js path, so restart after the
          # current symlink is swapped to make sure the new release is served.
          if pm2 describe "$APP_NAME" >/dev/null 2>&1; then
            pm2 delete "$APP_NAME"
          fi
          pm2 start server.js --name "$APP_NAME" --update-env

          pm2 save
          find "$DEPLOY_PATH/releases" -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf
          REMOTE
